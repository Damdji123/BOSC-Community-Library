</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="index.html" class="logo">BOSC Library</a>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="manage-books.html">Manage Books</a></li>
                    <li><a href="view-books.html">View Books</a></li>
                    <li><a href="manage-members.html" class="active">Manage Members</a></li>
                    <li><a href="view-members.html">View Members</a></li>
                    <li><a href="login.html">Login</a></li>

                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h2>Manage Members</h2>
                <p>Add new members to the library community</p>
            </div>
        </section>

        <section class="management-section">
            <div class="container">
                <div class="management-card">
                    <h3>Add New Member</h3>
                    <form id="member-form">
                        <div class="form-group">
                            <label for="member-name">Member Name</label>
                            <input type="text" id="member-name" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label for="member-email">Email (Optional)</label>
                            <input type="email" id="member-email" placeholder="Enter email address">
                        </div>
                        <button type="submit" class="btn-primary">Add Member</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 BOSC Community Library. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
