<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSC Community Library - View Members</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="index.html" class="logo">BOSC Library</a>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="manage-books.html">Manage Books</a></li>
                    <li><a href="view-books.html">View Books</a></li>
                    <li><a href="manage-members.html">Manage Members</a></li>
                    <li><a href="view-members.html" class="active">View Members</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html" class="nav-button">Register</a></li>
                </ul>
                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h2>Our Members</h2>
                <p>Meet the wonderful people in our reading community</p>
            </div>
        </section>

        <section class="members-section">
            <div class="container">
                <div class="filter-section">
                    <input type="text" id="search-input" placeholder="Search members by name or email...">
                    <select id="sort-select">
                        <option value="name-asc">Sort by Name (A-Z)</option>
                        <option value="name-desc">Sort by Name (Z-A)</option>
                        <option value="date-newest">Newest Members</option>
                        <option value="date-oldest">Oldest Members</option>
                    </select>
                </div>
                <div id="members-container" class="members-grid">
                    <!-- Members will be displayed here -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 BOSC Community Library. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/api.js"></script>
    <script src="js/view-members.js"></script>
</body>
</html>
