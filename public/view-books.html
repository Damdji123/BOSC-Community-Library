<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSC Community Library - View Books</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="index.html" class="logo"><i data-lucide="library"></i> BOSC Library</a>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="manage-books.html">Manage Books</a></li>
                    <li><a href="view-books.html" class="active">View Books</a></li>
                    <li><a href="manage-members.html">Manage Members</a></li>
                    <li><a href="view-members.html">View Members</a></li>
                    <li><a href="login.html">Login</a></li>

                </ul>
                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h2>Our Book Collection</h2>
                <p>Explore our diverse collection of books</p>
            </div>
        </section>

        <section class="books-section">
            <div class="container">
                <div class="filter-section">
                    <input type="text" id="search-input" placeholder="Search books...">
                    <select id="filter-select">
                        <option value="all">All Books</option>
                        <option value="available">Available</option>
                        <option value="borrowed">Borrowed</option>
                    </select>
                </div>
                <div id="books-container" class="books-grid">
                    <!-- Books will be displayed here -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 BOSC Community Library. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/api.js"></script>
    <script src="js/view-books.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
