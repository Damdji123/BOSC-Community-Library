<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOSC Community Library - Forgot Password</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <nav>
      <div class="nav-container">
        <a href="index.html" class="logo">BOSC Library</a>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="manage-books.html">Manage Books</a></li>
          <li><a href="view-books.html">View Books</a></li>
          <li><a href="manage-members.html">Manage Members</a></li>
          <li><a href="view-members.html">View Members</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html" class="nav-button">Register</a></li>
        </ul>
        <div class="hamburger">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="auth-page">
      <div class="container">
        <div class="auth-card">
          <h2 class="auth-title">Forgot Password</h2>
          <p>Enter your email address and we will help you reset your password.</p>
          <div id="auth-message" class="auth-message"></div>
          <form id="forgot-form">
            <div class="form-group">
              <label for="forgot-email">Email</label>
              <input id="forgot-email" type="email" placeholder="Enter your registered email" required />
            </div>
            <button type="submit" class="btn-primary">Send Reset Token</button>
          </form>
          <div class="form-links">
            <a href="login.html">Back to login</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 BOSC Community Library. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', handleForgotPassword);
  </script>
</body>
</html>
