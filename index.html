<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSC Community Library</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>BOSC Community Library Management System</h1>
    </header>

    <main>
        <div class="container">
            <section id="add-book">
                <h2>Add Book</h2>
                <form id="book-form">
                    <input type="text" id="book-title" placeholder="Book Title" required>
                    <input type="text" id="book-author" placeholder="Author" required>
                    <button type="submit">Add Book</button>
                </form>
            </section>

            <section id="add-member">
                <h2>Add Member</h2>
                <form id="member-form">
                    <input type="text" id="member-name" placeholder="Member Name" required>
                    <button type="submit">Add Member</button>
                </form>
            </section>

            <section id="borrow-return">
                <h2>Borrow/Return Book</h2>
                <form id="borrow-form">
                    <select id="borrow-member" required>
                        <option value="">Select Member</option>
                    </select>
                    <select id="borrow-book" required>
                        <option value="">Select Book</option>
                    </select>
                    <button type="submit" id="borrow-btn">Borrow Book</button>
                </form>
            </section>

            <section id="books-list">
                <h2>Books</h2>
                <ul id="books-ul"></ul>
            </section>

            <section id="members-list">
                <h2>Members</h2>
                <ul id="members-ul"></ul>
            </section>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
