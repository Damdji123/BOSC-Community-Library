<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOSC Community Library - Register Librarian</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <nav>
      <div class="nav-container">
        <a href="index.html" class="logo">BOSC Library</a>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="manage-books.html">Manage Books</a></li>
          <li><a href="view-books.html">View Books</a></li>
          <li><a href="manage-members.html">Manage Members</a></li>
          <li><a href="view-members.html">View Members</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html" class="active nav-button">Register</a></li>
        </ul>
        <div class="hamburger">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="auth-page">
      <div class="container">
        <div class="auth-card">
          <h2 class="auth-title">Register Librarian</h2>
          <p>Create your librarian account to manage the BOSC Community Library.</p>
          <div id="auth-message" class="auth-message"></div>
          <form id="register-form">
            <div class="form-group">
              <label for="register-name">Full Name</label>
              <input id="register-name" type="text" placeholder="Enter full name" required />
            </div>
            <div class="form-group">
              <label for="register-email">Email</label>
              <input id="register-email" type="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
              <label for="register-password">Password</label>
              <input id="register-password" type="password" placeholder="Create a password" required />
            </div>
            <div class="form-group">
              <label for="register-confirm-password">Confirm Password</label>
              <input id="register-confirm-password" type="password" placeholder="Confirm your password" required />
            </div>
            <button type="submit" class="btn-primary">Register</button>
          </form>
          <div class="form-links">
            <a href="login.html">Already have an account?</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 BOSC Community Library. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', handleRegistration);
  </script>
</body>
</html>
